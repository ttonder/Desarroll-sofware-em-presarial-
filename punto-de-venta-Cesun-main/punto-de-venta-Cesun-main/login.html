<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesion - Punto de Venta CESUN</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(37,99,235,0.12) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(6,182,212,0.08) 0%, transparent 40%);
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-logo-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #2563eb, #06b6d4);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            font-size: 2rem;
            box-shadow: 0 8px 30px rgba(37,99,235,0.3);
        }

        .login-logo h1 {
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .login-logo p {
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 6px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #94a3b8;
            font-size: 0.82rem;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 1.1rem;
            pointer-events: none;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: all 0.25s ease;
        }

        .form-group input::placeholder {
            color: #475569;
        }

        .form-group input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
            background: rgba(255,255,255,0.08);
        }

        .form-group input.error {
            border-color: #dc2626;
            box-shadow: 0 0 0 3px rgba(220,38,38,0.15);
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 4px;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: #94a3b8;
        }

        .error-msg {
            display: none;
            color: #f87171;
            font-size: 0.82rem;
            margin-top: 8px;
            padding: 10px 14px;
            background: rgba(220,38,38,0.1);
            border-radius: 8px;
            border: 1px solid rgba(220,38,38,0.2);
            animation: shakeIn 0.4s ease;
        }

        .error-msg.visible {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @keyframes shakeIn {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 8px;
            letter-spacing: 0.3px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37,99,235,0.35);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-login .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .usuarios-demo {
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .usuarios-demo p {
            color: #475569;
            font-size: 0.78rem;
            text-align: center;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .demo-users {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .demo-user-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            color: #cbd5e1;
            font-size: 0.85rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .demo-user-btn:hover {
            background: rgba(37,99,235,0.1);
            border-color: rgba(37,99,235,0.3);
        }

        .demo-user-btn .demo-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        .demo-user-btn .demo-info {
            flex: 1;
        }

        .demo-user-btn .demo-info strong {
            display: block;
            font-weight: 600;
            margin-bottom: 1px;
        }

        .demo-user-btn .demo-info small {
            color: #64748b;
            font-size: 0.75rem;
        }

        .admin-avatar { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
        .cajero-avatar { background: linear-gradient(135deg, #16a34a, #15803d); }

        @media (max-width: 480px) {
            .login-card { padding: 36px 24px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="login-logo-icon">&#128722;</div>
                <h1>Punto de Venta</h1>
                <p>CESUN Universidad</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label>Usuario</label>
                    <div class="input-wrapper">
                        <span class="input-icon">&#128100;</span>
                        <input type="text" id="input-usuario" placeholder="Ingresa tu usuario" autocomplete="username" autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label>Contrasena</label>
                    <div class="input-wrapper">
                        <span class="input-icon">&#128274;</span>
                        <input type="password" id="input-password" placeholder="Ingresa tu contrasena" autocomplete="current-password">
                        <button type="button" class="toggle-password" id="toggle-pass" title="Mostrar contrasena">&#128065;</button>
                    </div>
                </div>

                <div id="error-msg" class="error-msg">
                    <span>&#9888;</span>
                    <span id="error-text">Usuario o contrasena incorrectos</span>
                </div>

                <button type="submit" class="btn-login" id="btn-login">
                    <span id="btn-text">Iniciar Sesion</span>
                    <div class="spinner" id="btn-spinner"></div>
                </button>
            </form>

            <div class="usuarios-demo">
                <p>Acceso rapido</p>
                <div class="demo-users">
                    <button type="button" class="demo-user-btn" onclick="loginRapido('admin', 'admin123')">
                        <div class="demo-avatar admin-avatar">AD</div>
                        <div class="demo-info">
                            <strong>Administrador</strong>
                            <small>Acceso completo al sistema</small>
                        </div>
                    </button>
                    <button type="button" class="demo-user-btn" onclick="loginRapido('cajero', 'cajero123')">
                        <div class="demo-avatar cajero-avatar">CJ</div>
                        <div class="demo-info">
                            <strong>Cajero</strong>
                            <small>Ventas e historial</small>
                        </div>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Usuarios del sistema
        const USUARIOS = [
            { usuario: 'admin', password: 'admin123', nombre: 'Administrador', rol: 'admin' },
            { usuario: 'cajero', password: 'cajero123', nombre: 'Cajero', rol: 'cajero' },
            { usuario: 'diego', password: 'diego123', nombre: 'Diego Rivera', rol: 'admin' },
        ];

        // Verificar si ya hay sesion activa
        const sesion = JSON.parse(localStorage.getItem('pos_sesion') || 'null');
        if (sesion && sesion.activa) {
            window.location.href = 'index.html';
        }

        // Toggle password
        document.getElementById('toggle-pass').addEventListener('click', () => {
            const input = document.getElementById('input-password');
            const btn = document.getElementById('toggle-pass');
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = '&#128064;';
            } else {
                input.type = 'password';
                btn.innerHTML = '&#128065;';
            }
        });

        // Login form
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const usuario = document.getElementById('input-usuario').value.trim();
            const password = document.getElementById('input-password').value;
            intentarLogin(usuario, password);
        });

        function loginRapido(usuario, password) {
            document.getElementById('input-usuario').value = usuario;
            document.getElementById('input-password').value = password;
            intentarLogin(usuario, password);
        }

        function intentarLogin(usuario, password) {
            const errorEl = document.getElementById('error-msg');
            const errorText = document.getElementById('error-text');
            const btnLogin = document.getElementById('btn-login');
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('btn-spinner');

            // Reset
            errorEl.classList.remove('visible');
            document.getElementById('input-usuario').classList.remove('error');
            document.getElementById('input-password').classList.remove('error');

            // Validar campos vacios
            if (!usuario) {
                errorText.textContent = 'Ingresa tu nombre de usuario';
                errorEl.classList.add('visible');
                document.getElementById('input-usuario').classList.add('error');
                document.getElementById('input-usuario').focus();
                return;
            }

            if (!password) {
                errorText.textContent = 'Ingresa tu contrasena';
                errorEl.classList.add('visible');
                document.getElementById('input-password').classList.add('error');
                document.getElementById('input-password').focus();
                return;
            }

            // Simular carga
            btnLogin.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'block';

            setTimeout(() => {
                const user = USUARIOS.find(u => u.usuario === usuario && u.password === password);

                if (user) {
                    // Guardar sesion
                    localStorage.setItem('pos_sesion', JSON.stringify({
                        activa: true,
                        usuario: user.usuario,
                        nombre: user.nombre,
                        rol: user.rol,
                        loginTime: new Date().toISOString()
                    }));
                    window.location.href = 'index.html';
                } else {
                    // Error
                    btnLogin.disabled = false;
                    btnText.style.display = 'block';
                    spinner.style.display = 'none';
                    errorText.textContent = 'Usuario o contrasena incorrectos';
                    errorEl.classList.add('visible');
                    document.getElementById('input-usuario').classList.add('error');
                    document.getElementById('input-password').classList.add('error');
                    document.getElementById('input-password').value = '';
                    document.getElementById('input-password').focus();
                }
            }, 800);
        }

        // Enter en inputs
        document.getElementById('input-usuario').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('input-password').focus();
            }
        });
    </script>
</body>
</html>
